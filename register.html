<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — CareerPath AI</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="scanline"></div>

<header id="mainHeader">
  <div class="header-left">
    <div class="logo-wrap">
      <span class="logo-bracket">[</span>
      <a href="index.html" class="logo">CareerPath<span class="logo-accent">AI</span></a>
      <span class="logo-bracket">]</span>
    </div>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon-ring">🚀</div>
      <div class="auth-tag">// CREATE ACCOUNT</div>
      <h2>Join CareerPath AI</h2>
      <p class="auth-subtitle">Start your intelligent tech career roadmap</p>
    </div>
    <form id="registerForm" autocomplete="off">
      <div class="input-group">
        <label class="input-label">EMAIL ADDRESS</label>
        <div class="input-wrap">
          <span class="input-icon">@</span>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">PASSWORD</label>
        <div class="input-wrap">
          <span class="input-icon">⬡</span>
          <input type="password" id="password" placeholder="Min 6 characters" required>
          <span class="toggle-pass" onclick="togglePass('password',this)">👁</span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <small id="strengthText" class="strength-text"></small>
      </div>
      <button type="submit" class="auth-btn">
        <span class="auth-btn-text">CREATE ACCOUNT</span>
        <span class="auth-btn-arrow">→</span>
      </button>
      <p class="auth-link">Already registered? <a href="login.html">Login here</a></p>
    </form>
  </div>
</div>

<script>
if(localStorage.getItem("loggedIn")==="true") window.location.href="index.html";
function togglePass(id,el){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";el.textContent=i.type==="password"?"👁":"🙈";}
document.getElementById('password').addEventListener('input',function(){
  const v=this.value,f=document.getElementById('strengthFill'),t=document.getElementById('strengthText');
  if(!v.length){f.style.width='0%';f.style.background='';t.textContent='';return;}
  if(v.length<6){f.style.width='30%';f.style.background='#ff3b3b';t.textContent='Weak';}
  else if(v.length<10){f.style.width='65%';f.style.background='#f97316';t.textContent='Medium';}
  else{f.style.width='100%';f.style.background='#00ff88';t.textContent='Strong ✓';}
});
</script>
<script src="script.js"></script>
</body>
</html>
